{% extends "base.html" %}

{% block title %}Cadastro de Usuário{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto space-y-8 animate-fade-in-up pb-12">

  <!-- Header -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
    <div class="flex items-center gap-4">
      <div class="bg-brand-50 dark:bg-brand-900/20 p-3 rounded-2xl text-brand-600 dark:text-brand-400">
        <i data-lucide="user-cog" class="w-8 h-8"></i>
      </div>
      <div>
        <h1 class="text-3xl font-extrabold text-brand-900 dark:text-brand-500 transition-colors">Cadastro de Usuário
        </h1>
        <p class="text-gray-500 dark:text-gray-400 font-medium transition-colors">Defina perfis de acesso e credenciais
          para novos operadores.</p>
      </div>
    </div>

    <a href="{{ url_for('usuarios.lista_usuarios') }}"
      class="inline-flex items-center justify-center gap-2 text-gray-400 hover:text-brand-600 font-bold transition-all px-4 py-2 hover:bg-brand-50 dark:hover:bg-brand-900/20 rounded-xl">
      <i data-lucide="arrow-left" class="w-5 h-5"></i>
      Voltar para Lista
    </a>
  </div>

  <!-- Form Card -->
  <div
    class="bg-white dark:bg-gray-900/50 rounded-[2.5rem] shadow-soft border border-gray-100 dark:border-gray-800 p-8 sm:p-12 transition-all">

    <div
      class="mb-10 flex items-center gap-3 text-sm text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/20 px-5 py-3 rounded-2xl border border-red-100 dark:border-red-900/30 w-fit font-bold">
      <i data-lucide="info" class="w-5 h-5"></i>
      <span>Campos marcados com <span class="text-red-500">*</span> são de preenchimento obrigatório.</span>
    </div>

    <form method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-8">

      <div class="md:col-span-2 flex items-center gap-3 border-b border-gray-50 dark:border-gray-800 pb-4 mb-2">
        <div class="w-1 h-4 bg-brand-600 rounded-full"></div>
        <h3 class="text-sm font-black text-gray-400 dark:text-gray-500 uppercase tracking-[0.2em]">Identificação e
          Acesso</h3>
      </div>

      <!-- Nome -->
      <div class="space-y-2 md:col-span-2">
        <label
          class="block text-[10px] font-extrabold text-gray-400 dark:text-gray-500 uppercase tracking-widest px-2">Nome
          Completo *</label>
        <div class="relative group">
          <i data-lucide="user"
            class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-brand-600 transition-colors"></i>
          <input name="nome" type="text" required
            class="w-full pl-12 pr-4 py-4 bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl focus:ring-4 focus:ring-brand-500/10 focus:border-brand-600 outline-none text-gray-700 dark:text-gray-100 font-medium transition-all"
            placeholder="Digite o nome completo do usuário">
        </div>
      </div>

      <!-- Email -->
      <div class="space-y-2">
        <label
          class="block text-[10px] font-extrabold text-gray-400 dark:text-gray-500 uppercase tracking-widest px-2">E-mail
          de Acesso *</label>
        <div class="relative group">
          <i data-lucide="mail"
            class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-brand-600 transition-colors"></i>
          <input name="email" type="email" required
            class="w-full pl-12 pr-4 py-4 bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl focus:ring-4 focus:ring-brand-500/10 focus:border-brand-600 outline-none text-gray-700 dark:text-gray-100 font-medium transition-all"
            placeholder="exemplo@email.com">
        </div>
      </div>

      <!-- CPF -->
      <div class="space-y-2">
        <label
          class="block text-[10px] font-extrabold text-gray-400 dark:text-gray-500 uppercase tracking-widest px-2">CPF
          <span class="font-normal text-gray-400 lowercase">(apenas números)</span></label>
        <div class="relative group">
          <i data-lucide="credit-card"
            class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-brand-600 transition-colors"></i>
          <input name="cpf" type="text" inputmode="numeric" maxlength="14" oninput="maskCPF(this)"
            class="w-full pl-12 pr-4 py-4 bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl focus:ring-4 focus:ring-brand-500/10 focus:border-brand-600 outline-none text-gray-700 dark:text-gray-100 font-bold transition-all"
            placeholder="Ex: 12345678900">
        </div>
      </div>

      <!-- Vinculo -->
      <div class="space-y-2">
        <label
          class="block text-[10px] font-extrabold text-gray-400 dark:text-gray-500 uppercase tracking-widest px-2">Nº
          Funcional / Matrícula</label>
        <div class="relative group">
          <i data-lucide="id-card"
            class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-brand-600 transition-colors"></i>
          <input name="num_func_vinculo" type="text"
            class="w-full pl-12 pr-4 py-4 bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl focus:ring-4 focus:ring-brand-500/10 focus:border-brand-600 outline-none text-gray-700 dark:text-gray-100 font-bold transition-all"
            placeholder="Selecione o número de vínculo">
        </div>
      </div>

      <!-- Perfil -->
      <div class="space-y-2">
        <label
          class="block text-[10px] font-extrabold text-gray-400 dark:text-gray-500 uppercase tracking-widest px-2">Perfil
          de Acesso *</label>
        <div class="relative group">
          <i data-lucide="shield"
            class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-brand-600 transition-colors"></i>
          <select name="tipo" required
            class="w-full pl-12 pr-10 py-4 bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl focus:ring-4 focus:ring-brand-500/10 focus:border-brand-600 outline-none text-gray-700 dark:text-gray-100 font-bold transition-all appearance-none cursor-pointer">
            <option value="">Selecione...</option>
            <option value="admin">Administrador Geral</option>
            <option value="medico">Médico / Especialista</option>
            <option value="assistente_social">Assistente Social</option>
            <option value="usuario">Operador Comum</option>
          </select>
          <i data-lucide="chevron-down"
            class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none group-focus-within:rotate-180 transition-transform"></i>
        </div>
      </div>

      <!-- Senha -->
      <div class="space-y-2 md:col-span-2">
        <label
          class="block text-[10px] font-extrabold text-gray-400 dark:text-gray-500 uppercase tracking-widest px-2">Senha
          de Segurança *</label>
        <div class="relative group">
          <i data-lucide="lock"
            class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-brand-600 transition-colors"></i>
          <input name="senha" type="password" required
            class="w-full pl-12 pr-4 py-4 bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl focus:ring-4 focus:ring-brand-500/10 focus:border-brand-600 outline-none text-gray-700 dark:text-gray-100 font-medium transition-all"
            placeholder="Crie uma senha forte (letras e números)">
        </div>
      </div>

      <!-- Actions -->
      <div
        class="md:col-span-2 pt-10 flex flex-col sm:flex-row justify-end items-center gap-6 border-t border-gray-50 dark:border-gray-800 mt-6 transition-colors">
        <button type="reset"
          class="px-8 py-4 rounded-2xl font-bold text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors uppercase text-[10px] tracking-widest">
          Limpar Dados
        </button>
        <button type="submit"
          class="w-full sm:w-auto px-12 py-4 rounded-2xl bg-brand-900 text-white font-black hover:bg-brand-800 shadow-xl shadow-brand-900/20 transition-all active:scale-95 flex items-center justify-center gap-2 uppercase text-xs tracking-widest">
          <i data-lucide="save" class="w-5 h-5"></i>
          Salvar Usuário
        </button>
      </div>

    </form>
  </div>
</div>

<script>
  window.addEventListener('DOMContentLoaded', () => {
    if (typeof lucide !== 'undefined') lucide.createIcons();
  });
</script>
{% endblock %}
