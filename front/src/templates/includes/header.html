<!-- TOP HEADER BAR -->
<header
    class="h-20 bg-white border-b border-slate-200/50 flex items-center justify-between px-10 flex-shrink-0 z-20 relative">



    <!-- Left: Breadcrumb -->
    <div class="flex items-center">
        <nav class="flex items-center text-[10px] sm:text-xs font-black uppercase tracking-widest text-slate-400">
            <span class="hover:text-blue-600 transition-colors cursor-pointer">QualiSUS</span>
            <span class="mx-3 text-slate-200">/</span>
            <span class="text-blue-600">Painel de Controle</span>
        </nav>
    </div>

    <!-- Right: Actions & Profile -->
    <div class="flex items-center gap-6">
        <button
            class="w-11 h-11 rounded-2xl flex items-center justify-center text-slate-400 hover:bg-slate-50 hover:text-blue-600 transition-all relative">
            <i data-lucide="bell" class="w-5 h-5"></i>
            <span class="absolute top-2.5 right-2.5 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
        </button>
        <button
            class="w-11 h-11 rounded-2xl flex items-center justify-center text-slate-400 hover:bg-slate-50 hover:text-blue-600 transition-all">
            <i data-lucide="help-circle" class="w-5 h-5"></i>
        </button>

        <div class="h-8 w-px bg-slate-200"></div>

        <!-- Profile -->
        <div class="flex items-center gap-3 relative group">
            <div class="text-right">
                <p class="text-sm font-black text-slate-900 leading-none">{{ session.get('nome', 'Usuário')
                    }}</p>
                <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest mt-1">Administrador
                </p>
            </div>
            <button
                class="w-11 h-11 rounded-2xl overflow-hidden border-2 border-white shadow-sm ring-2 ring-slate-100 group-hover:ring-blue-200 transition-all">
                <img src="https://ui-avatars.com/api/?name={{ session.get('nome', 'User') }}&background=E0F2FE&color=0369A1&bold=true"
                    class="w-full h-full object-cover">
            </button>
            <!-- Dropdown -->
            <div
                class="absolute right-0 top-14 mt-2 w-52 bg-white border border-slate-100 rounded-2xl shadow-xl py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
                <a href="{{ url_for('perfil') }}"
                    class="flex items-center gap-3 px-4 py-2.5 text-xs font-bold text-slate-600 hover:bg-slate-50 transition">
                    <i data-lucide="settings" class="w-4 h-4"></i> Meu Perfil
                </a>
                <div class="h-px bg-slate-50 mx-4 my-1"></div>
                <a href="{{ url_for('logout') }}"
                    class="flex items-center gap-3 px-4 py-2.5 text-xs font-bold text-red-600 hover:bg-red-50 transition">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Sair do Sistema
                </a>
            </div>
        </div>
    </div>
</header>
