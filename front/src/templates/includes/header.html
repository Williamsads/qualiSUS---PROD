<header class="h-20 glass-ui flex items-center justify-between px-10 flex-shrink-0 z-30 sticky top-0">

    <!-- Pernambuco Signature Bar - Elite Refined -->
    <div class="absolute top-0 left-0 right-0 h-[2px] flex opacity-80">
        <div class="h-full flex-1 bg-pe-blue"></div>
        <div class="h-full flex-1 bg-pe-red"></div>
        <div class="h-full flex-1 bg-pe-yellow"></div>
        <div class="h-full flex-1 bg-pe-green"></div>
    </div>

    <!-- Mobile: Toggle Button -->
    <button id="btnMobileMenu" onclick="toggleMobileSidebar()"
        class="md:hidden p-3 text-slate-400 hover:text-royal transition-all hover:bg-royal/5 rounded-xl">
        <i data-lucide="menu" class="w-6 h-6"></i>
    </button>

    <!-- Left: Branding Focus -->
    <div class="hidden md:flex items-center gap-4">
        <div class="flex flex-col">
            <h2 class="text-[10px] font-black text-royal uppercase tracking-[0.25em] leading-none mb-1 shadow-sm">
                QualiSUS</h2>
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none">Intelligence Engine
            </p>
        </div>
    </div>

    <!-- Right: Elite Actions & Profile -->
    <div class="flex items-center gap-6">



        <!-- Notification Center -->
        <div class="flex items-center gap-2 bg-slate-100/50 p-1 rounded-2xl border border-slate-200/30">
            <button
                class="w-10 h-10 rounded-xl flex items-center justify-center text-slate-500 hover:text-royal hover:bg-white hover:shadow-sm transition-all relative group">
                <i data-lucide="bell" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                <span
                    class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white shadow-sm"></span>
            </button>
            <button
                class="w-10 h-10 rounded-xl flex items-center justify-center text-slate-400 hover:text-royal hover:bg-white hover:shadow-sm transition-all group">
                <i data-lucide="search" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
            </button>
        </div>

</header>
