<form method="POST" id="editForm" class="p-8 space-y-8">
    <input type="hidden" id="editId">

    <!-- SEÇÃO: Dados Pessoais -->
    <div class="space-y-4">
        <h3
            class="text-sm font-extrabold text-brand-600 dark:text-brand-400 uppercase tracking-widest flex items-center gap-2">
            <i data-lucide="user" class="w-4 h-4"></i>
            Dados Pessoais
        </h3>
        <div class="grid grid-cols-1 gap-4">
            <div>
                <label
                    class="block text-[10px] font-extrabold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-2">Nome
                    Completo</label>
                <input id="editNome" name="nome"
                    class="w-full px-5 py-3.5 bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-600 dark:text-gray-100 transition-all">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label
                        class="block text-[10px] font-extrabold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-2">CPF</label>
                    <input id="editCPF" name="cpf"
                        class="w-full px-5 py-3.5 bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-600 dark:text-gray-100 transition-all">
                </div>

                <div>
                    <label
                        class="block text-[10px] font-extrabold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-2">Matrícula</label>
                    <input id="editMatriculaField" name="num_func_vinculo"
                        class="w-full px-5 py-3.5 bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-600 dark:text-gray-100 transition-all">
                </div>
            </div>
        </div>
    </div>

    <!-- DIVISOR -->
    <div class="border-t border-gray-100 dark:border-gray-800"></div>

    <!-- SEÇÃO: Dados Profissionais -->
    <div class="space-y-4">
        <h3
            class="text-sm font-extrabold text-brand-600 dark:text-brand-400 uppercase tracking-widest flex items-center gap-2">
            <i data-lucide="briefcase" class="w-4 h-4"></i>
            Dados Profissionais
        </h3>
        <div class="grid grid-cols-1 gap-4">
            <div>
                <label
                    class="block text-[10px] font-extrabold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-2">Especialidade</label>
                <input id="editEspecialidadeField" name="especialidade"
                    class="w-full px-5 py-3.5 bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-600 dark:text-gray-100 transition-all">
            </div>

            <div>
                <label
                    class="block text-[10px] font-extrabold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-2">Unidade</label>
                <div class="relative group">
                    <select id="editUnidadeField" name="unidade_atendimento"
                        class="w-full pl-5 pr-10 py-3.5 bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-600 dark:text-gray-100 transition-all appearance-none cursor-pointer">
                        <option value="">Selecione...</option>
                        {% for u in unidades %}
                        <option value="{{ u.nome }}">{{ u.nome }}</option>
                        {% endfor %}
                    </select>
                    <i data-lucide="chevron-down"
                        class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"></i>
                </div>
            </div>

            <label
                class="flex items-center gap-4 bg-blue-50/50 dark:bg-blue-900/10 p-4 rounded-2xl border border-blue-100 dark:border-blue-900/30 cursor-pointer">
                <div class="relative inline-flex items-center cursor-pointer group">
                    <input type="checkbox" name="atendimento" id="editAtendimento" class="sr-only peer">
                    <div
                        class="w-14 h-7 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-brand-300 dark:peer-focus:ring-brand-800 rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all dark:border-gray-600 peer-checked:bg-brand-600">
                    </div>
                </div>
                <div>
                    <span class="text-sm font-bold text-brand-900 dark:text-brand-400">Realiza
                        Atendimento?</span>
                    <p class="text-xs text-gray-500 dark:text-gray-500">Profissional aparecerá na lista de
                        agendamentos</p>
                </div>
            </label>
        </div>
    </div>

    <!-- DIVISOR -->
    <div class="border-t border-gray-100 dark:border-gray-800"></div>

    <!-- SEÇÃO: Situação -->
    <div class="space-y-4">
        <h3
            class="text-sm font-extrabold text-brand-600 dark:text-brand-400 uppercase tracking-widest flex items-center gap-2">
            <i data-lucide="calendar-clock" class="w-4 h-4"></i>
            Situação Atual
        </h3>
        <div class="grid grid-cols-1 gap-4">
            <div>
                <label
                    class="block text-[10px] font-extrabold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-2">Situação</label>
                <div class="relative group">
                    <select id="editSituacaoField" name="situacao"
                        class="w-full pl-5 pr-10 py-3.5 bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-600 dark:text-gray-100 transition-all appearance-none cursor-pointer">
                        <option value="Ativo">✅ Ativo</option>
                        <option value="Férias">🏖️ Férias</option>
                        <option value="Licença">📋 Licença</option>
                        <option value="Afastado">⛔ Afastado</option>
                        <option value="Outros">📌 Outros</option>
                    </select>
                    <i data-lucide="chevron-down"
                        class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"></i>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label
                        class="block text-[10px] font-extrabold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-2">
                        <i data-lucide="calendar" class="w-3 h-3 inline mr-1"></i>
                        Data Início
                    </label>
                    <input id="editSituacaoDataInicio" name="situacao_data_inicio" type="date"
                        class="w-full px-5 py-3.5 bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-600 dark:text-gray-100 transition-all cursor-pointer">
                </div>

                <div>
                    <label
                        class="block text-[10px] font-extrabold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-2">
                        <i data-lucide="calendar" class="w-3 h-3 inline mr-1"></i>
                        Data Fim
                    </label>
                    <input id="editSituacaoDataFim" name="situacao_data_fim" type="date"
                        class="w-full px-5 py-3.5 bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-600 dark:text-gray-100 transition-all cursor-pointer">
                </div>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="flex justify-end items-center gap-4 pt-6 border-t border-gray-100 dark:border-gray-800">
        <button type="button" onclick="closeEditModal()"
            class="px-6 py-3 font-bold text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors uppercase text-xs tracking-widest">Cancelar</button>
        <button type="submit"
            class="bg-brand-900 text-white px-8 py-3.5 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-brand-800 shadow-xl shadow-brand-900/20 transition-all active:scale-95 flex items-center gap-2">
            <i data-lucide="save" class="w-4 h-4"></i>
            Salvar Alterações
        </button>
    </div>
</form>
