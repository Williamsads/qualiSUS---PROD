<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png"
        href="{{ url_for('static', filename='img/Logo da QualiSUS com pinwheel colorido.png') }}">
    <title>Redefinir Senha - QualiSUS</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f6fc',
                            100: '#e1edf8',
                            200: '#bcd9f1',
                            300: '#82b9e7',
                            400: '#4097da',
                            500: '#0099FF', // Slick Blue
                            600: '#007ACC',
                            700: '#005C99',
                            800: '#003D66',
                            900: '#001F33',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>

<body class="bg-gray-50 h-screen flex items-center justify-center p-4 font-sans text-gray-800">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 space-y-8 animate-fade-in border border-gray-100">

        <!-- Logo -->
        <div class="flex flex-col items-center">
            <img src="{{ url_for('static', filename='img/Logo da QualiSUS com pinwheel colorido.png') }}"
                alt="Logo QualiSUS" class="h-16 mb-4">
            <h2 class="text-2xl font-bold text-gray-800">Redefinir Senha</h2>
            <p class="text-gray-500 text-sm mt-1 text-center">Crie uma nova senha segura para sua conta.</p>
        </div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="space-y-3">
            {% for categoria, mensagem in messages %}
            <div class="flex items-center gap-3 p-3 rounded-xl border text-sm font-medium shadow-sm 
                            {% if categoria == 'erro' %} bg-red-50 border-red-200 text-red-700
                            {% elif categoria == 'sucesso' %} bg-green-50 border-green-200 text-green-700
                            {% else %} bg-blue-50 border-blue-200 text-blue-700 {% endif %}">
                <i data-lucide="{% if categoria == 'erro' %}alert-circle{% elif categoria == 'sucesso' %}check-circle{% else %}info{% endif %}"
                    class="w-5 h-5"></i>
                <span>{{ mensagem }}</span>
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <!-- Form -->
        <form method="POST" class="space-y-6">
            <div class="space-y-4">
                <!-- New Password -->
                <div class="space-y-1.5">
                    <label for="senha" class="block text-sm font-semibold text-gray-700">Nova Senha</label>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400 group-focus-within:text-brand-600 transition-colors">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </div>
                        <input type="password" id="senha" name="senha" placeholder="••••••••" required
                            class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all duration-200 text-gray-700 placeholder-gray-400 font-medium shadow-sm">
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="space-y-1.5">
                    <label for="confirmar_senha" class="block text-sm font-semibold text-gray-700">Confirmar Nova
                        Senha</label>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400 group-focus-within:text-brand-600 transition-colors">
                            <i data-lucide="shield-check" class="w-5 h-5"></i>
                        </div>
                        <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="••••••••"
                            required
                            class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all duration-200 text-gray-700 placeholder-gray-400 font-medium shadow-sm">
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                class="group w-full bg-gradient-to-r from-brand-900 to-brand-700 hover:from-brand-800 hover:to-brand-600 text-white py-3.5 rounded-xl font-bold text-base shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all duration-200 flex items-center justify-center gap-2">
                <span>Alterar Senha</span>
                <i data-lucide="check-circle-2" class="w-5 h-5"></i>
            </button>

            <div class="text-center">
                <a href="/index" class="text-sm font-medium text-gray-500 hover:text-brand-600 transition-colors">
                    Voltar para o login
                </a>
            </div>
        </form>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
