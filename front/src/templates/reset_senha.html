<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png"
        href="{{ url_for('static', filename='img/Logo da QualiSUS com pinwheel colorido.png') }}">
    <title>Redefinir Senha - QualiSUS</title>
    <meta name="description" content="Redefina sua senha do Sistema Qualivida.">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f6fc',
                            100: '#e1edf8',
                            200: '#bcd9f1',
                            300: '#82b9e7',
                            400: '#4097da',
                            500: '#004b90', // Gov PE Blue
                            600: '#003e78',
                            700: '#003261',
                            800: '#00264a',
                            900: '#001931', // Base Blue
                        },
                        pe: {
                            blue: '#0099FF',
                            gold: '#FFCC00',
                            red: '#E30613',
                            green: '#009639'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-up': 'slideUp 0.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <style>
        .solid-panel {
            background-color: #0B1120;
            border-right: 1px solid #1e293b;
        }

        .dark .solid-panel {
            background-color: #0B1120;
            border-right: 1px solid #1e293b;
        }

        .input-solid {
            background-color: #1e293b;
            border: 1px solid #334155;
            transition: all 0.2s ease;
            color: white !important;
        }

        .input-solid:focus {
            background-color: #0f172a;
            border-color: #0063F7;
            box-shadow: 0 0 0 4px rgba(0, 99, 247, 0.2);
        }

        /* Prevent background change on autofill */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #1e293b inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .bg-system-blue {
            background-color: #0063F7;
        }
    </style>
</head>

<body
    class="bg-brand-900 min-h-screen w-full flex items-center justify-center font-sans text-gray-800 transition-colors duration-500 relative overflow-hidden">

    <!-- Background -->
    <div class="absolute inset-0 z-0">
        <img src="{{ url_for('static', filename='img/centro_recife.jpg') }}"
            class="w-full h-full object-cover opacity-40 scale-105 animate-[kenburns_20s_infinite] blur-md object-center">
        <div class="absolute inset-0 bg-gradient-to-br from-[#001931]/90 to-[#004b90]/80 mix-blend-multiply z-10"></div>
        <div class="absolute inset-0 bg-brand-900/60 z-20"></div>
    </div>

    <!-- Center Content -->
    <div class="relative z-30 w-full max-w-md p-4 sm:p-8 animate-fade-in flex flex-col items-center">

        <!-- Logo -->
        <a href="/login" class="block mb-8 hover:scale-105 transition-transform duration-300">
            <img src="{{ url_for('static', filename='img/Logo da QualiSUS com pinwheel colorido.png') }}"
                alt="Logo QualiSUS"
                class="h-16 sm:h-20 w-auto object-contain drop-shadow-[0_0_15px_rgba(255,255,255,0.1)]">
        </a>

        <!-- Glass Card -->
        <div
            class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-[2rem] shadow-[0_20px_50px_-12px_rgba(0,0,0,0.5)] p-8 sm:p-10 w-full relative overflow-hidden">
            <!-- Decorative accent -->
            <div class="absolute top-0 left-0 w-full h-1.5 flex opacity-90">
                <div class="flex-1 bg-pe-blue"></div>
                <div class="flex-1 bg-pe-gold"></div>
                <div class="flex-1 bg-pe-red"></div>
                <div class="flex-1 bg-pe-green"></div>
            </div>

            <div class="text-center space-y-3 mb-8 mt-2">
                <div
                    class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-white/10 text-white shadow-inner mb-2 border border-white/10">
                    <i data-lucide="shield-check" class="w-7 h-7"></i>
                </div>
                <h2 class="text-2xl sm:text-3xl font-extrabold text-white tracking-tight">Nova Senha</h2>
                <p class="text-sm text-blue-100/80 font-medium">
                    Digite sua nova credencial de acesso.
                </p>
            </div>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="space-y-3 mb-6">
                {% for categoria, mensagem in messages %}
                <div class="flex items-center gap-3 p-4 rounded-xl border text-[13px] font-bold backdrop-blur-md
                            {% if categoria == 'erro' %} bg-red-500/20 border-red-500/30 text-red-200
                            {% elif categoria == 'sucesso' %} bg-emerald-500/20 border-emerald-500/30 text-emerald-200
                            {% else %} bg-blue-500/20 border-blue-500/30 text-blue-200 {% endif %}">
                    <i data-lucide="{% if categoria == 'erro' %}alert-circle{% elif categoria == 'sucesso' %}check-circle{% else %}info{% endif %}"
                        class="w-5 h-5 flex-shrink-0"></i>
                    <span>{{ mensagem }}</span>
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <!-- Form -->
            <form autocomplete="off" method="POST" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="token" value="{{ token }}">

                <!-- Nova Senha -->
                <div class="space-y-2">
                    <label for="senha"
                        class="block text-[13px] font-bold uppercase tracking-widest text-blue-50 ml-1">Nova
                        Senha</label>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-white/40 group-focus-within:text-pe-blue transition-colors">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </div>
                        <input type="password" id="senha" name="senha" placeholder="••••••••" required
                            class="w-full pl-12 pr-12 py-4 bg-black/20 border border-white/10 rounded-xl outline-none text-white placeholder-white/30 text-base font-bold focus:bg-black/40 focus:border-pe-blue focus:ring-4 focus:ring-pe-blue/30 transition-all">
                        <button type="button" data-target="senha"
                            class="toggle-btn absolute inset-y-0 right-0 pr-4 flex items-center text-white/40 hover:text-white cursor-pointer transition-colors"
                            tabindex="-1">
                            <i data-lucide="eye" class="w-5 h-5 hidden eye-open"></i>
                            <i data-lucide="eye-off" class="w-5 h-5 eye-closed"></i>
                        </button>
                    </div>
                </div>

                <!-- Confirmar Senha -->
                <div class="space-y-2">
                    <label for="confirmar_senha"
                        class="block text-[13px] font-bold uppercase tracking-widest text-blue-50 ml-1">Confirmar
                        Senha</label>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-white/40 group-focus-within:text-pe-blue transition-colors">
                            <i data-lucide="check-square" class="w-5 h-5"></i>
                        </div>
                        <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="••••••••"
                            required
                            class="w-full pl-12 pr-12 py-4 bg-black/20 border border-white/10 rounded-xl outline-none text-white placeholder-white/30 text-base font-bold focus:bg-black/40 focus:border-pe-blue focus:ring-4 focus:ring-pe-blue/30 transition-all">
                        <button type="button" data-target="confirmar_senha"
                            class="toggle-btn absolute inset-y-0 right-0 pr-4 flex items-center text-white/40 hover:text-white cursor-pointer transition-colors"
                            tabindex="-1">
                            <i data-lucide="eye" class="w-5 h-5 hidden eye-open"></i>
                            <i data-lucide="eye-off" class="w-5 h-5 eye-closed"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="pt-4">
                    <button type="submit" id="btnSubmit"
                        class="w-full bg-pe-blue hover:bg-blue-500 text-white py-4 rounded-xl font-black text-base md:text-lg shadow-[0_10px_20px_-10px_rgba(0,153,255,0.5)] hover:-translate-y-1 active:scale-95 transition-all duration-300 flex items-center justify-center gap-3 group">
                        <span>Atualizar Senha</span>
                        <i data-lucide="check-circle-2" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                    </button>
                </div>
            </form>

            <div class="mt-8 pt-6 border-t border-white/10 text-center">
                <a href="/login"
                    class="text-xs sm:text-sm font-black uppercase tracking-widest text-blue-200 hover:text-white transition-all flex items-center justify-center gap-2">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    Voltar para o Login
                </a>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-10 text-center flex flex-col items-center gap-4">
            <img src="{{ url_for('static', filename='img/GOV-JPG-1024x452-removebg-preview.png') }}"
                class="h-6 brightness-0 invert opacity-40 hover:opacity-100 transition-opacity" alt="Gov PE">
            <p class="text-[10px] text-blue-100/40 font-black uppercase tracking-[0.2em] drop-shadow-md">
                © 2026 • QualiSUS PE
            </p>
        </div>
    </div>

    <!-- Init Scripts -->
    <script>
        lucide.createIcons();
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const targetId = btn.getAttribute('data-target');
                const input = document.getElementById(targetId);
                const iconOpen = btn.querySelector('.eye-open');
                const iconClosed = btn.querySelector('.eye-closed');
                if (input.type === 'password') {
                    input.type = 'text';
                    iconOpen.classList.remove('hidden');
                    iconClosed.classList.add('hidden');
                } else {
                    input.type = 'password';
                    iconOpen.classList.add('hidden');
                    iconClosed.classList.remove('hidden');
                }
            });
        });
    </script>
</body>

</html>
