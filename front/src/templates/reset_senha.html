<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png"
        href="{{ url_for('static', filename='img/Logo da QualiSUS com pinwheel colorido.png') }}">
    <title>Redefinir Senha - QualiSUS</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f6fc',
                            100: '#e1edf8',
                            200: '#bcd9f1',
                            300: '#82b9e7',
                            400: '#4097da',
                            500: '#0099FF', // Slick Blue
                            600: '#007ACC',
                            700: '#005C99',
                            800: '#003D66',
                            900: '#001F33',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <style>
        .mesh-gradient {
            background-color: #0B1120;
            background-image:
                radial-gradient(at 0% 0%, rgba(0, 99, 247, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
        }

        .solid-card {
            background: #0B1120;
            border: 1px solid #1e293b;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-solid {
            background-color: #1e293b;
            border: 1px solid #334155;
            transition: all 0.2s ease;
            color: white !important;
        }

        .input-solid:focus {
            background-color: #0f172a;
            border-color: #0063F7;
            box-shadow: 0 0 0 4px rgba(0, 99, 247, 0.2);
        }

        /* Prevent background change on autofill */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #1e293b inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>

<body class="mesh-gradient h-screen flex items-center justify-center p-4 font-sans text-gray-800">

    <div class="w-full max-w-md solid-card rounded-[2.5rem] p-10 space-y-8 animate-fade-in relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1.5 flex">
            <div class="flex-1 bg-blue-600"></div>
            <div class="flex-1 bg-emerald-600"></div>
        </div>

        <!-- Logo -->
        <div class="flex flex-col items-center">
            <div
                class="w-20 h-20 bg-blue-600 rounded-[2rem] flex items-center justify-center shadow-xl shadow-blue-500/30 mb-6">
                <img src="{{ url_for('static', filename='img/Logo da QualiSUS com pinwheel colorido.png') }}"
                    alt="Logo QualiSUS" class="h-12 w-12 object-contain brightness-0 invert">
            </div>
            <h2 class="text-3xl font-black text-white tracking-tight">Nova Senha</h2>
            <p class="text-slate-400 text-sm mt-2 text-center font-medium">Crie uma credencial robusta para sua
                segurança.</p>
        </div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="space-y-3">
            {% for categoria, mensagem in messages %}
            <div class="flex items-center gap-3 p-3 rounded-xl border text-sm font-medium shadow-sm 
                            {% if categoria == 'erro' %} bg-red-50 border-red-200 text-red-700
                            {% elif categoria == 'sucesso' %} bg-green-50 border-green-200 text-green-700
                            {% else %} bg-blue-50 border-blue-200 text-blue-700 {% endif %}">
                <i data-lucide="{% if categoria == 'erro' %}alert-circle{% elif categoria == 'sucesso' %}check-circle{% else %}info{% endif %}"
                    class="w-5 h-5"></i>
                <span>{{ mensagem }}</span>
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <!-- Form -->
        <form method="POST" class="space-y-6">
            <div class="space-y-4">
                <!-- New Password -->
                <div class="space-y-2">
                    <label for="senha"
                        class="block text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 ml-1">Nova
                        Senha</label>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-600 transition-colors">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </div>
                        <input type="password" id="senha" name="senha" placeholder="••••••••" required
                            class="w-full pl-12 pr-4 py-4 input-solid rounded-2xl outline-none text-white placeholder-slate-500 font-bold">
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="space-y-2">
                    <label for="confirmar_senha"
                        class="block text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 ml-1">Confirmar
                        Senha</label>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-600 transition-colors">
                            <i data-lucide="shield-check" class="w-5 h-5"></i>
                        </div>
                        <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="••••••••"
                            required
                            class="w-full pl-12 pr-4 py-4 input-solid rounded-2xl outline-none text-white placeholder-slate-500 font-bold">
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                class="group w-full bg-blue-600 hover:brightness-110 text-white py-4 rounded-2xl font-black text-base shadow-2xl shadow-blue-500/20 hover:shadow-blue-500/40 hover:-translate-y-1 transition-all duration-300 flex items-center justify-center gap-3">
                <span>Finalizar Alteração</span>
                <i data-lucide="check-circle-2" class="w-6 h-6 group-hover:scale-110 transition-transform"></i>
            </button>

            <div class="text-center">
                <a href="/index" class="text-sm font-medium text-gray-500 hover:text-brand-600 transition-colors">
                    Voltar para o login
                </a>
            </div>
        </form>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
