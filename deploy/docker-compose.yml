version: '3.9'
services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env.example
    volumes:
      - ../backend:/app/backend
      - ../db:/app/db
    ports:
      - "5000:5000"
    depends_on:
      - db
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: qualivida
      POSTGRES_USER: qualivida
      POSTGRES_PASSWORD: qualivida
    ports:
      - "5432:5432"
    volumes:
      - ../db/postgres:/var/lib/postgresql/data
